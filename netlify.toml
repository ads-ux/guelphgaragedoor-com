[build]
publish = "."

[[redirects]]
from = "/services.html"
to = "/#services"
status = 302

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

# Redirect the raw Netlify subdomain to the primary domain
[[redirects]]
from = "https://guelphgaragedoor-com.netlify.app/*"
to = "https://guelphgaragedoor.com/:splat"
status = 301
force = true
